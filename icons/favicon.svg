<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#060810"/>
  <!-- Inner subtle border ring -->
  <rect x="2" y="2" width="60" height="60" rx="9" fill="none" stroke="#00e5a0" stroke-width="0.6" opacity="0.2"/>
  <!-- Top-right accent corner slash -->
  <polygon points="40,0 64,0 64,24" fill="#00e5a0" opacity="0.95"/>
  <rect x="0" y="0" width="64" height="64" rx="10" fill="none"/>
  <!-- VS lettering - shadow/depth layer -->
  <text x="32" y="42" font-family="'Space Mono', monospace, Courier" font-size="27" font-weight="700"
        text-anchor="middle" fill="none" stroke="#060810" stroke-width="4">VS</text>
  <!-- VS lettering - main -->
  <text x="32" y="42" font-family="'Space Mono', monospace, Courier" font-size="27" font-weight="700"
        text-anchor="middle" fill="#e8edf5">VS</text>
  <!-- Accent underline bar -->
  <rect x="10" y="47" width="40" height="2.5" rx="1.2" fill="#00e5a0"/>
  <!-- Purple dot accent at end of bar -->
  <circle cx="53" cy="48.3" r="2.5" fill="#7b61ff"/>
</svg>
